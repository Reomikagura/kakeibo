<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシート家計簿</title>
  <link rel="apple-touch-icon" href=".IMG_5306">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eee8;
    --muted: #888884;
    --accent: #7fa9f5;
    --accent2: #5dd4a8;
    --warn: #f5a244;
    --danger: #f06464;

    --cat-food: #f0855a;
    --cat-transport: #7fa9f5;
    --cat-daily: #5dd4a8;
    --cat-fashion: #c87ff0;
    --cat-entertainment: #f5c842;
    --cat-health: #f06480;
    --cat-other: #888884;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 100px;
  }

  /* Header */
  .header {
    padding: 24px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header-title { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-month { font-size: 22px; font-weight: 700; }
  .header-badge {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Budget ring */
  .budget-section {
    padding: 20px 20px 0;
  }
  .budget-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 20px;
  }
  .budget-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .budget-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .budget-spent { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; }
  .budget-total { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .budget-edit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .budget-edit-btn:hover { border-color: var(--border2); color: var(--text); }

  .bar-wrap { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .bar-ok { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .bar-warn { background: linear-gradient(90deg, var(--warn), #f07030); }
  .bar-over { background: linear-gradient(90deg, var(--danger), #c03030); }

  .budget-remain {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .budget-remain-val { color: var(--accent2); font-weight: 500; }
  .budget-remain-val.warn { color: var(--warn); }
  .budget-remain-val.over { color: var(--danger); }

  /* Chart section */
  .section { padding: 16px 20px 0; }
  .section-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 12px; }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 20px;
  }

  /* Category legend */
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { color: var(--muted); }
  .cat-amount { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Upload zone */
  .upload-zone {
    background: var(--surface);
    border: 1.5px dashed var(--border2);
    border-radius: 20px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(127,169,245,0.05);
  }
  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-text { color: var(--muted); font-size: 13px; }
  .upload-text strong { color: var(--accent); }
  .upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Expense list */
  .expense-list { display: flex; flex-direction: column; gap: 8px; }
  .expense-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .expense-item:hover { border-color: var(--border2); }
  .expense-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }
  .expense-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .expense-body { flex: 1; min-width: 0; }
  .expense-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .expense-right { text-align: right; }
  .expense-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .expense-date { font-size: 11px; color: var(--muted); }
  .expense-delete {
    position: absolute;
    right: 8px;
    top: 8px;
    background: var(--surface2);
    border: none;
    color: var(--muted);
    border-radius: 6px;
    padding: 2px 6px;
    cursor: pointer;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .expense-item:hover .expense-delete { opacity: 1; }

  /* Cat tag */
  .cat-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    margin-top: 2px;
  }

  /* AI loading overlay */
  .ai-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,17,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  .ai-overlay.hidden { display: none; }
  .ai-spinner {
    width: 48px;
    height: 48px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-status { color: var(--muted); font-size: 13px; }
  .ai-dots::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots { 0%,25%{content:'.'} 50%{content:'..'} 75%,100%{content:'...'} }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .cat-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: var(--text);
    font-size: 12px;
    transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--border2); }
  .cat-btn.active { border-width: 2px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 20px;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(15,15,17,0.9);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 20px 20px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 30;
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 16px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  /* Add FAB */
  .fab {
    position: fixed;
    bottom: 72px;
    right: 20px;
    width: 52px;
    height: 52px;
    background: var(--accent);
    border-radius: 16px;
    border: none;
    color: #0f0f11;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(127,169,245,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 30;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(127,169,245,0.4); }

  /* Tab views */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Store list */
  .store-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .store-name { font-weight: 500; }
  .store-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .store-total { font-family: 'DM Mono', monospace; font-size: 15px; }

  .preview-img {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="ai-overlay hidden" id="aiOverlay">
  <div class="ai-spinner"></div>
  <div class="ai-status"><span class="ai-dots" id="aiStatusText">AI解析中</span></div>
</div>

<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">支出を追加</div>
    <div id="previewContainer"></div>
    <div class="form-group">
      <label class="form-label">店名</label>
      <input class="form-input" id="inputStore" placeholder="例：コンビニ、スーパー" />
    </div>
    <div class="form-group">
      <label class="form-label">品目・内容</label>
      <input class="form-input" id="inputName" placeholder="例：ランチ、交通費" />
    </div>
    <div class="form-group">
      <label class="form-label">金額（円）</label>
      <input class="form-input" id="inputAmount" type="number" placeholder="0" />
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input class="form-input" id="inputDate" type="date" />
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="cat-picker" id="catPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancel">キャンセル</button>
      <button class="btn-primary" id="modalSave">保存する</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="budgetModalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">今月の予算を設定</div>
    <div class="form-group">
      <label class="form-label">月予算（円）</label>
      <input class="form-input" id="budgetInput" type="number" placeholder="50000" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="budgetCancel">キャンセル</button>
      <button class="btn-primary" id="budgetSave">設定する</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">家計簿</div>
      <div class="header-month" id="headerMonth"></div>
    </div>
    <div class="header-badge" id="headerCount">0件</div>
  </div>

  <!-- Budget bar -->
  <div class="budget-section">
    <div class="budget-card">
      <div class="budget-top">
        <div>
          <div class="budget-label">今月の支出</div>
          <div class="budget-spent" id="budgetSpent">¥0</div>
          <div class="budget-total" id="budgetTotal">予算: ¥50,000</div>
        </div>
        <button class="budget-edit-btn" id="budgetEditBtn">予算変更</button>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill bar-ok" id="barFill" style="width: 0%"></div>
      </div>
      <div class="budget-remain">
        <span>残り使用可能</span>
        <span class="budget-remain-val" id="budgetRemain">¥50,000</span>
      </div>
    </div>
  </div>

  <!-- Tab: ホーム -->
  <div class="tab-content active" id="tabHome">
    <!-- Chart -->
    <div class="section">
      <div class="section-label">カテゴリ別</div>
      <div class="chart-card">
        <div style="position: relative; height: 200px; width: 160px; margin: 0 auto;">
          <canvas id="catChart"></canvas>
        </div>
        <div class="cat-grid" id="catLegend"></div>
      </div>
    </div>

    <!-- Recent expenses -->
    <div class="section">
      <div class="section-label">最近の支出</div>
      <div class="expense-list" id="expenseList">
        <div class="empty">
          <div class="empty-icon">🧾</div>
          レシートを撮影して<br>支出を記録しよう
        </div>
      </div>
    </div>
  </div>

  <!-- Tab: 店舗 -->
  <div class="tab-content" id="tabStores">
    <div class="section">
      <div class="section-label">よく行くお店</div>
      <div id="storeList">
        <div class="empty"><div class="empty-icon">🏪</div>まだ記録がありません</div>
      </div>
    </div>
  </div>

  <!-- Tab: 撮影 -->
  <div class="tab-content" id="tabScan">
    <div class="section">
      <div class="section-label">レシートをAI解析</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" class="upload-input" id="fileInput" accept="image/*" capture="environment" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">
          <strong>タップして撮影</strong><br>
          またはギャラリーから選択
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FAB: add manual -->
<button class="fab" id="fabBtn">+</button>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" data-tab="tabHome" id="navHome">
    <span class="nav-icon">📊</span>
    <span>ホーム</span>
  </button>
  <button class="nav-btn" data-tab="tabScan" id="navScan">
    <span class="nav-icon">📷</span>
    <span>スキャン</span>
  </button>
  <button class="nav-btn" data-tab="tabStores" id="navStores">
    <span class="nav-icon">🏪</span>
    <span>店舗</span>
  </button>
</div>

<script>
const CATEGORIES = [
  { id: 'food', name: '食費', icon: '🍜', color: '#f0855a' },
  { id: 'transport', name: '交通', icon: '🚃', color: '#7fa9f5' },
  { id: 'daily', name: '日用品', icon: '🧴', color: '#5dd4a8' },
  { id: 'fashion', name: 'ファッション', icon: '👗', color: '#c87ff0' },
  { id: 'entertainment', name: '娯楽', icon: '🎮', color: '#f5c842' },
  { id: 'health', name: '医療・美容', icon: '💊', color: '#f06480' },
  { id: 'other', name: 'その他', icon: '📦', color: '#888884' },
];

const APIKEY_PLACEHOLDER = '';

let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
let budget = parseInt(localStorage.getItem('budget') || '50000');
let selectedCat = 'food';
let catChart = null;
let editingId = null;
let pendingImageData = null;

const $ = id => document.getElementById(id);

function save() {
  localStorage.setItem('expenses', JSON.stringify(expenses));
  localStorage.setItem('budget', budget);
}

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function getThisMonthExpenses() {
  const now = new Date();
  return expenses.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
}

function getCatInfo(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

function render() {
  const now = new Date();
  $('headerMonth').textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月';

  const monthExp = getThisMonthExpenses();
  $('headerCount').textContent = monthExp.length + '件';

  const spent = monthExp.reduce((s, e) => s + e.amount, 0);
  const pct = Math.min((spent / budget) * 100, 100);

  $('budgetSpent').textContent = fmt(spent);
  $('budgetTotal').textContent = '予算: ' + fmt(budget);

  const fill = $('barFill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill ' + (pct >= 100 ? 'bar-over' : pct >= 80 ? 'bar-warn' : 'bar-ok');

  const remain = budget - spent;
  const rv = $('budgetRemain');
  rv.textContent = fmt(Math.abs(remain));
  rv.className = 'budget-remain-val' + (remain < 0 ? ' over' : remain < budget * 0.2 ? ' warn' : '');
  if (remain < 0) rv.textContent = '超過: ' + fmt(-remain);

  renderChart(monthExp);
  renderList(monthExp);
  renderStores(monthExp);
}

function renderChart(monthExp) {
  const catTotals = {};
  CATEGORIES.forEach(c => catTotals[c.id] = 0);
  monthExp.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });

  const labels = CATEGORIES.map(c => c.name);
  const data = CATEGORIES.map(c => catTotals[c.id]);
  const colors = CATEGORIES.map(c => c.color);
  const total = data.reduce((a, b) => a + b, 0);

  if (catChart) catChart.destroy();
  const ctx = $('catChart').getContext('2d');
  catChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderWidth: 0,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ' ' + fmt(ctx.raw) + ' (' + (total ? Math.round(ctx.raw/total*100) : 0) + '%)' }
      }},
    }
  });

  const legend = $('catLegend');
  legend.innerHTML = CATEGORIES.map(c => {
    const amt = catTotals[c.id];
    const pct = total ? Math.round(amt / total * 100) : 0;
    return `<div class="cat-item">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span class="cat-name">${c.icon} ${c.name}</span>
      <span class="cat-amount" style="color:${c.color}">${pct}%</span>
    </div>`;
  }).join('');
}

function renderList(monthExp) {
  const list = $('expenseList');
  const sorted = [...monthExp].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20);
  if (!sorted.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🧾</div>レシートを撮影して<br>支出を記録しよう</div>';
    return;
  }
  list.innerHTML = sorted.map(e => {
    const cat = getCatInfo(e.category);
    const d = new Date(e.date);
    const dateStr = (d.getMonth()+1) + '/' + d.getDate();
    return `<div class="expense-item" data-id="${e.id}" style="border-left-color:${cat.color}">
      <div class="expense-item" style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${cat.color};border-radius:3px 0 0 3px;"></div>
      <div class="expense-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="expense-body">
        <div class="expense-name">${e.name}</div>
        <div class="expense-meta">${e.store || '店名なし'} · <span style="color:${cat.color}">${cat.name}</span></div>
      </div>
      <div class="expense-right">
        <div class="expense-amount">${fmt(e.amount)}</div>
        <div class="expense-date">${dateStr}</div>
      </div>
      <button class="expense-delete" onclick="deleteExpense('${e.id}',event)">✕</button>
    </div>`;
  }).join('');
}

function renderStores(monthExp) {
  const storeMap = {};
  monthExp.forEach(e => {
    const s = e.store || '不明';
    if (!storeMap[s]) storeMap[s] = { total: 0, count: 0 };
    storeMap[s].total += e.amount;
    storeMap[s].count++;
  });
  const stores = Object.entries(storeMap).sort((a, b) => b[1].total - a[1].total);
  const el = $('storeList');
  if (!stores.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏪</div>まだ記録がありません</div>';
    return;
  }
  el.innerHTML = stores.map(([name, v]) => `
    <div class="store-item">
      <div>
        <div class="store-name">${name}</div>
        <div class="store-meta">${v.count}回の利用</div>
      </div>
      <div class="store-total">${fmt(v.total)}</div>
    </div>
  `).join('');
}

// Modal open/close
function openModal(prefill = {}) {
  editingId = prefill.id || null;
  $('modalTitle').textContent = editingId ? '支出を編集' : '支出を追加';
  $('inputStore').value = prefill.store || '';
  $('inputName').value = prefill.name || '';
  $('inputAmount').value = prefill.amount || '';
  $('inputDate').value = prefill.date || new Date().toISOString().split('T')[0];
  selectedCat = prefill.category || 'food';

  const preview = $('previewContainer');
  if (prefill.imageData) {
    preview.innerHTML = `<img class="preview-img" src="${prefill.imageData}">`;
    pendingImageData = prefill.imageData;
  } else {
    preview.innerHTML = '';
    pendingImageData = null;
  }

  buildCatPicker();
  $('modalBg').classList.remove('hidden');
}

function closeModal() {
  $('modalBg').classList.add('hidden');
}

function buildCatPicker() {
  $('catPicker').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn ${c.id === selectedCat ? 'active' : ''}" data-cat="${c.id}"
      style="${c.id === selectedCat ? 'border-color:' + c.color + ';color:' + c.color : ''}"
      onclick="selectCat('${c.id}','${c.color}',this)">${c.icon}<br><span style="font-size:10px">${c.name}</span></button>`
  ).join('');
}

function selectCat(id, color, el) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = '';
    b.style.color = '';
  });
  el.classList.add('active');
  el.style.borderColor = color;
  el.style.color = color;
}

$('modalCancel').onclick = closeModal;
$('modalBg').onclick = e => { if (e.target === $('modalBg')) closeModal(); };

$('modalSave').onclick = () => {
  const name = $('inputName').value.trim();
  const amount = parseFloat($('inputAmount').value);
  if (!name || isNaN(amount) || amount <= 0) {
    alert('品目と金額を入力してください');
    return;
  }
  if (editingId) {
    const idx = expenses.findIndex(e => e.id === editingId);
    if (idx >= 0) {
      expenses[idx] = { ...expenses[idx], store: $('inputStore').value.trim(), name, amount, date: $('inputDate').value, category: selectedCat };
    }
  } else {
    expenses.push({
      id: Date.now().toString(),
      store: $('inputStore').value.trim(),
      name,
      amount,
      date: $('inputDate').value,
      category: selectedCat,
      imageData: pendingImageData || null,
    });
  }
  save();
  closeModal();
  render();
};

function deleteExpense(id, e) {
  e.stopPropagation();
  if (confirm('この支出を削除しますか？')) {
    expenses = expenses.filter(ex => ex.id !== id);
    save();
    render();
  }
}

$('fabBtn').onclick = () => { switchTab('tabHome'); openModal(); };

// Budget modal
$('budgetEditBtn').onclick = () => {
  $('budgetInput').value = budget;
  $('budgetModalBg').classList.remove('hidden');
};
$('budgetCancel').onclick = () => $('budgetModalBg').classList.add('hidden');
$('budgetModalBg').onclick = e => { if (e.target === $('budgetModalBg')) $('budgetModalBg').classList.add('hidden'); };
$('budgetSave').onclick = () => {
  const v = parseInt($('budgetInput').value);
  if (v > 0) { budget = v; save(); render(); }
  $('budgetModalBg').classList.add('hidden');
};

// Tab switching
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $(tabId).classList.add('active');
  document.querySelector(`[data-tab="${tabId}"]`)?.classList.add('active');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.onclick = () => switchTab(btn.dataset.tab);
});

// File upload & AI
$('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const imageData = ev.target.result;
    await analyzeReceipt(imageData);
  };
  reader.readAsDataURL(file);
};

const WORKER_URL = 'https://receipt-api.tsubakitoue.workers.dev';
const SECRET_TOKEN = 'ryota2025secret';

async function analyzeReceipt(imageData) {
  const overlay = $('aiOverlay');
  const statusEl = $('aiStatusText');
  overlay.classList.remove('hidden');
  statusEl.textContent = 'AIがレシートを解析中';

  try {
    const base64 = imageData.split(',')[1];
    const mimeType = imageData.split(';')[0].split(':')[1];

    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Auth-Token': SECRET_TOKEN,
      },
      body: JSON.stringify({ imageBase64: base64, mimeType }),
    });

    if (!response.ok) throw new Error('サーバーエラー: ' + response.status);

    const data = await response.json();
    const text = data.text || '';

    let parsed;
    try {
      const clean = text.replace(/```json\n?|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('解析結果の読み取りに失敗しました');
    }

    overlay.classList.add('hidden');
    switchTab('tabHome');
    openModal({
      store: parsed.store || '',
      name: parsed.name || '',
      amount: parsed.amount || '',
      date: parsed.date || new Date().toISOString().split('T')[0],
      category: parsed.category || 'other',
      imageData: imageData,
    });

  } catch (err) {
    overlay.classList.add('hidden');
    switchTab('tabHome');
    openModal({ imageData });
    alert('AI解析に失敗しました。手動で入力してください。\nエラー: ' + err.message);
  }

  $('fileInput').value = '';
}

// Drag & drop on upload zone
const uz = $('uploadZone');
uz.ondragover = e => { e.preventDefault(); uz.classList.add('drag-over'); };
uz.ondragleave = () => uz.classList.remove('drag-over');
uz.ondrop = e => {
  e.preventDefault();
  uz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => analyzeReceipt(ev.target.result);
    reader.readAsDataURL(file);
  }
};
